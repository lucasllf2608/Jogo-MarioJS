<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Run</title>
    <link rel="icon" href="./images/icon.png" type="image/x-icon">
    <link rel="stylesheet"  href="./css/style.css"/>    
</head>
<body>
    <div class="game-board">
        
        <div class="score-container">
            SCORE: <span class="score">0</span>
        </div>

        <div class="game-over-screen hide">
            <h2>FIM DE JOGO</h2>
            <p>Pontuação final: <span class="final-score">0</span></p>
            <button class="restart-button" onclick="restartGame()">Jogar Novamente</button>
        </div>

        <img class="clouds" src="./sprites/clouds.png">    
        <img class="mario" src="./sprites/mario.gif">    
        <img class="pipe" src="./sprites/pipe.png">
    </div>


<script src="./js/script.js"></script>
</body>
</html>
